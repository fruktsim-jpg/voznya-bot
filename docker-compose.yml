services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - voznya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    # Внутри docker-сети БД доступна по имени сервиса "db".
    environment:
      DATABASE_URL: ${DATABASE_URL}
      # Реальная выдача Telegram Gifts (sendGift). По умолчанию выключена;
      # включить = GIFTS_DELIVERY_ENABLED=true в .env. См. STARS_FLOW.md.
      GIFTS_DELIVERY_ENABLED: ${GIFTS_DELIVERY_ENABLED:-false}
      # Внутренний API для сайта (открытие кейсов через веб). НЕ публикуем
      # порт наружу: сайт ходит сюда по имени сервиса "bot" внутри docker-сети
      # (http://bot:8081). Включается только при заданном INTERNAL_API_SECRET.
      INTERNAL_API_ENABLED: ${INTERNAL_API_ENABLED:-false}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      INTERNAL_API_PORT: ${INTERNAL_API_PORT:-8081}


volumes:

  voznya_pgdata:
