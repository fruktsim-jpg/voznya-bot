services:
  db:
    # pgvector/pgvector:pg16 — тот же PG 16, но с предустановленным extension
    # `vector` (CREATE EXTENSION в миграции 0049 без этого не сработает).
    # Volume voznya_pgdata совместим: тот же major, данные не пересоздаются.
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - voznya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    # Внутри docker-сети БД доступна по имени сервиса "db".
    environment:
      DATABASE_URL: ${DATABASE_URL}
      # Реальная выдача Telegram Gifts (sendGift). По умолчанию выключена;
      # включить = GIFTS_DELIVERY_ENABLED=true в .env. См. STARS_FLOW.md.
      GIFTS_DELIVERY_ENABLED: ${GIFTS_DELIVERY_ENABLED:-false}
      # Внутренний API для сайта. Если сайт в той же docker-сети — ходит по
      # http://bot:8081. Если сайт на Vercel (другой хост) — порт нужно
      # опубликовать (см. ports ниже) и закрыть фаерволом/секретом.
      INTERNAL_API_ENABLED: ${INTERNAL_API_ENABLED:-false}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      INTERNAL_API_HOST: ${INTERNAL_API_HOST:-0.0.0.0}
      INTERNAL_API_PORT: ${INTERNAL_API_PORT:-8081}
    # Публикуем порт внутреннего API наружу, ТОЛЬКО когда сайт живёт на другом
    # хосте (Vercel) и не может ходить по имени сервиса "bot". Доступ защищён
    # секретом X-Internal-Secret, но порт стоит дополнительно закрыть фаерволом
    # или повесить за reverse proxy с TLS. Если сайт в той же docker-сети —
    # этот блок можно удалить.
    ports:
      - "${INTERNAL_API_PORT:-8081}:${INTERNAL_API_PORT:-8081}"
    volumes:
      # Кеш fastembed-моделей (~120 МБ ONNX-весов intfloat/multilingual-e5-small).
      # Без этого volume каждый rebuild = повторное скачивание с HuggingFace.
      # Путь /root/.cache/fastembed — дефолт fastembed внутри контейнера
      # (uid=0 в нашем образе). См. app/features/drun/embeddings.py.
      - voznya_fastembed_cache:/root/.cache/fastembed


volumes:

  voznya_pgdata:
  voznya_fastembed_cache:
